[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Source directory
pythonpath = .

# Output format and coverage
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --cov=src
    --cov-report=html
    --cov-report=term-missing

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    security: marks tests related to security analysis

# Logging
log_cli_level = INFO

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Cache directory
cache_dir = .pytest_cache
