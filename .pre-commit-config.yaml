# .pre-commit-config.yaml
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# Docs: https://pre-commit.com

repos:
  # ───────────────── Standard file hygiene ───────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      # Blocks large files from being committed
      - id: check-added-large-files
        args: [--maxkb=500]
      # Blocks .env files from being committed
      # Disabled for development workflow
      # - id: no-commit-to-branch
      #   args: [--branch, main, --branch, master]

  # ───────────────── Detect secrets (credentials, tokens, keys) ──────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets (passwords, tokens, API keys)
        args:
          - --baseline
          - .secrets.baseline
        # Exclude files where fake/example credentials are expected
        exclude: |
          (?x)^(
            \.env\.example|
            docs/.*|
            tests/.*
          )$

  # ───────────────── MikroTik-specific PII scanner ───────────────────────────
  - repo: local
    hooks:
      - id: check-pii
        name: Scan for RouterOS PII (MAC, usernames, hostnames, serial numbers)
        language: python
        entry: python scripts/check_pii.py
        # Only scan these file types - skip HTML reports, binary backups
        types_or: [python, json, text]
        # Exclude docs and test fixtures
        exclude: |
          (?x)^(
            docs/|
            \.env\.example|
            tests/fixtures/|
            .*\.backup$|
            .*\.html$
          )

  # ───────────────── Python quality ──────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        name: Bandit security linter
        args: [-c, .bandit.yml, -ll]
        exclude: ^tests/

  # ───────────────── Python type checking ────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: Mypy type checker
        args: [--config-file=mypy.ini]
        exclude: ^tests/

  # ───────────────── Python code style ───────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]

# ───────────────── CI settings ───────────────────────────────────────────────
default_language_version:
  python: python3.13

default_stages: [pre-commit, pre-push]
